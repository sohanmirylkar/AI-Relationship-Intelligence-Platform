services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      JWT_SECRET_KEY: "local-dev-change-me"
      DEFAULT_LLM_PROVIDER: "${DEFAULT_LLM_PROVIDER:-anthropic}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.5}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_VERSION: "${ANTHROPIC_VERSION:-2023-06-01}"
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
      SUPABASE_CRM_TABLE: "${SUPABASE_CRM_TABLE:-crm_exports}"
    volumes:
      - irip-data:/app/data
    ports:
      - "8000:8000"

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    environment:
      IRIP_API_BASE: "http://api:8000/api/v1"
    depends_on:
      - api
    ports:
      - "8501:8501"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: irip
      POSTGRES_USER: irip
      POSTGRES_PASSWORD: irip-local
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docs/database_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

volumes:
  irip-data:
  postgres-data:
