name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest
      - name: Validate Dockerfiles parse
        run: |
          docker build -f Dockerfile.api -t irip-api:test .
          docker build -f Dockerfile.streamlit -t irip-ui:test .
